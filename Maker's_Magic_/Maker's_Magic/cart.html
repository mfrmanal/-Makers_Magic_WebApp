<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <title>Shopping Cart</title>
    <style>

        body{
            font-family: Arial;
            margin:40px;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
        }

        .cart-container{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .cart-item{
            display:flex;
            align-items:center;
            gap:20px;
            border-bottom:1px solid #ddd;
            padding:15px 0;
        }

        .cart-item img{
            width:120px;
            border-radius:5px;
        }

        .price{
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>
    <h1>Your Cart</h1>

    <div class="cart-container">
        <div id="cart"></div>
    </div>

<script>
    let product = JSON.parse(localStorage.getItem("cartItem"));

    if(product){

    document.getElementById("cart").innerHTML = `
        <div class="cart-item">
        <img src="${product.image}">
            <div>
            <h3>${product.name}</h3>
            <p class="price">$${product.price}</p>
            </div>
        </div>`   ;
    }

</script>

</body>
</html>
